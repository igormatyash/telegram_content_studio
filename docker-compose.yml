services:
  admin:
    build: .
    command: ["voicerhub-admin"]
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    expose:
      - "8080"
    networks:
      - studio

  bot:
    build: .
    command: ["content-studio-worker"]
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - studio

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - admin
    networks:
      - studio

volumes:
  caddy_data:
  caddy_config:

networks:
  studio:
